services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    environment:
      QDRANT__STORAGE__ON_DISK: "true"
    volumes:
      - ./var/data/qdrant:/qdrant/storage
    ports:
      - "6333:6333"

  kb_api:
    build:
      context: .
      dockerfile: Dockerfile
    command: >-
      bash -lc "python -m scripts.download_model --manifest ./models/model_manifest.json
      --target default --output ${LLM_MODEL_PATH:-./models/model.gguf} --allow-missing-hash --max-retries 5
      && exec uvicorn ${BACKEND_ENTRYPOINT:-app.api.main:app} --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      BACKEND_ENTRYPOINT: "app.api.main:app"
      BACKEND_LEGACY_ENTRYPOINT: "backend.app.main:app"
      INGEST_AUTOSTART_WORKER: "false"
      INGEST_USE_LOCAL_QUEUE: "false"
      QDRANT_URL: "http://qdrant:6333"
    volumes:
      - ./var/data:/app/var/data
      - ./models:/app/models
    depends_on:
      qdrant:
        condition: service_started
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/ready').getcode() == 200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  kb_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: >-
      bash -lc "exec python -m app.worker.main"
    env_file:
      - .env
    environment:
      INGEST_AUTOSTART_WORKER: "true"
      INGEST_USE_LOCAL_QUEUE: "false"
      QDRANT_URL: "http://qdrant:6333"
    volumes:
      - ./var/data:/app/var/data
      - ./models:/app/models
    depends_on:
      qdrant:
        condition: service_started
    restart: unless-stopped
