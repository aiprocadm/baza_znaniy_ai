env APP_PORT;
env BASIC_USER;
env RATE_BURST;
env RATE_LIMIT;

events {}

http {
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=$env_RATE_LIMIT;

    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name _;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name _;

        access_log /var/log/nginx/kb_access.log;
        error_log /var/log/nginx/kb_error.log;

        ssl_certificate     /data/ssl/kb.local.crt;
        ssl_certificate_key /data/ssl/kb.local.key;

        auth_basic           "Restricted";
        auth_basic_user_file /data/ssl/$env_BASIC_USER;

        location = /health {
            limit_except GET HEAD { deny all; }

            proxy_pass http://127.0.0.1:$env_APP_PORT/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ^~ /api/ {
            proxy_pass http://127.0.0.1:$env_APP_PORT/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            limit_req zone=api_limit burst=$env_RATE_BURST nodelay;
        }

        location / {
            root /data/www;
            try_files $uri /index.html;
        }
    }
}
