<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Knowledge Base Service</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        margin: 0;
        padding: 2rem;
        background: #0f172a;
        color: #e2e8f0;
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        background: rgba(15, 23, 42, 0.65);
        border-radius: 16px;
        padding: 2.5rem;
        box-shadow: 0 30px 60px rgba(15, 23, 42, 0.55);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(148, 163, 184, 0.2);
      }
      h1 {
        margin-top: 0;
        font-size: 2.5rem;
        letter-spacing: 0.04em;
      }
      p {
        line-height: 1.6;
      }
      ul {
        list-style: none;
        padding: 0;
      }
      li {
        margin: 0.75rem 0;
      }
      a {
        color: #38bdf8;
        text-decoration: none;
        font-weight: 600;
      }
      a:hover {
        text-decoration: underline;
      }
      code {
        background: rgba(148, 163, 184, 0.1);
        padding: 0.125rem 0.35rem;
        border-radius: 4px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Knowledge Base API</h1>
      <p>
        Minimal landing page for the knowledge base service used during smoke
        tests.
      </p>
      <ul>
        <li><a href="/health">Health check</a></li>
        <li><a href="/api/docs/upload">Document upload</a></li>
        <li><a href="/api/chat">Chat endpoint</a></li>
      </ul>
      <p>
        Explore the autogenerated documentation at <code>/docs</code>.
      </p>
    </main>
  </body>
</html>
