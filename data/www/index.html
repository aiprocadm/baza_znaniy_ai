<!doctype html><meta charset="utf-8">
<title>KB</title>
<style>
body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 760px; }
form { margin-bottom: 1.5rem; display: grid; gap: 0.5rem; }
fieldset { border: 1px solid #ccc; padding: 1rem; }
legend { font-weight: 600; }
input, button, textarea { font: inherit; padding: 0.4rem 0.6rem; }
textarea { resize: vertical; min-height: 4rem; }
#out { white-space: pre-wrap; background: #f8f9fa; padding: 1rem; border-radius: 0.5rem; border: 1px solid #e5e7eb; }
.status { color: #b91c1c; min-height: 1.2rem; }
</style>
<h1>KB Chat</h1>

<section>
  <fieldset>
    <legend>Параметры запроса</legend>
    <label>
      User ID
      <input id="user-id" placeholder="Например, user-123" required>
    </label>
    <label>
      Conversation ID (необязательно)
      <input id="conversation-id" placeholder="general">
    </label>
  </fieldset>
</section>

<section>
  <fieldset>
    <legend>Чат</legend>
    <form id="chat-form">
      <textarea id="message" placeholder="Введите вопрос" required></textarea>
      <button>Отправить</button>
    </form>
    <div id="chat-status" class="status"></div>
  </fieldset>
  <pre id="out"></pre>
</section>

<section>
  <fieldset>
    <legend>Загрузка документов</legend>
    <form id="upload-form">
      <input id="upload-file" type="file" accept=".pdf,.docx,.txt" required>
      <button>Загрузить</button>
    </form>
    <div id="upload-status" class="status"></div>
  </fieldset>
</section>

<script>
const userInput = document.getElementById('user-id');
const conversationInput = document.getElementById('conversation-id');
const messageInput = document.getElementById('message');
const chatStatus = document.getElementById('chat-status');
const uploadStatus = document.getElementById('upload-status');
const output = document.getElementById('out');
const chatForm = document.getElementById('chat-form');
const uploadForm = document.getElementById('upload-form');
const fileInput = document.getElementById('upload-file');

function requireUserId() {
  const value = userInput.value.trim();
  if (!value) {
    throw new Error('Укажите user_id.');
  }
  return value;
}

function buildConversationId() {
  const raw = conversationInput.value.trim();
  return raw || null;
}

chatForm.addEventListener('submit', async (event) => {
  event.preventDefault();
  chatStatus.textContent = '';
  output.textContent = 'Загрузка...';

  let userId;
  try {
    userId = requireUserId();
  } catch (err) {
    output.textContent = '';
    chatStatus.textContent = err.message;
    return;
  }

  const payload = {
    user_id: userId,
    conversation_id: buildConversationId(),
    message: messageInput.value,
  };

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    if (!response.ok) {
      throw new Error(`Ошибка ${response.status}`);
    }

    const data = await response.json();
    const lines = [data.answer?.trim() || ''];
    lines.push('', 'Цитаты:');
    if (data.citations && data.citations.length) {
      lines.push(JSON.stringify(data.citations, null, 2));
    } else {
      lines.push('Нет доступных ссылок');
    }
    if (data.citations_insufficient) {
      lines.push('', '⚠️ Найдено меньше трёх релевантных цитат');
    }
    output.textContent = lines.join('\n');
  } catch (err) {
    output.textContent = '';
    chatStatus.textContent = err.message || 'Не удалось отправить сообщение';
    console.error(err);
  }
});

uploadForm.addEventListener('submit', async (event) => {
  event.preventDefault();
  uploadStatus.textContent = '';

  let userId;
  try {
    userId = requireUserId();
  } catch (err) {
    uploadStatus.textContent = err.message;
    return;
  }

  const file = fileInput.files?.[0];
  if (!file) {
    uploadStatus.textContent = 'Выберите файл';
    return;
  }

  const form = new FormData();
  form.append('file', file);
  form.append('user_id', userId);
  const conv = buildConversationId();
  if (conv) {
    form.append('conversation_id', conv);
  }

  try {
    const response = await fetch('/api/docs/upload', {
      method: 'POST',
      body: form,
    });

    if (!response.ok) {
      throw new Error(`Ошибка ${response.status}`);
    }

    const data = await response.json();
    uploadStatus.textContent = `Загружено фрагментов: ${data.chunks}`;
    fileInput.value = '';
  } catch (err) {
    uploadStatus.textContent = err.message || 'Не удалось загрузить файл';
    console.error(err);
  }
});
</script>
