user  nginx;
worker_processes auto;

events { worker_connections 1024; }

http {
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log warn;

  sendfile on;
  server_tokens off;
  client_max_body_size 50m;

  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

  include       mime.types;
  default_type  application/octet-stream;

  server {
    listen 80;
    server_name kb.local;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name kb.local;

    ssl_certificate     /srv/projects/kb/data/ssl/kb.local.crt;
    ssl_certificate_key /srv/projects/kb/data/ssl/kb.local.key;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header Referrer-Policy "no-referrer";

    root /srv/projects/kb/data/www;
    location = / { try_files /index.html =404; }

    location = /health {
      auth_basic "kb api";
      auth_basic_user_file /srv/projects/kb/data/ssl/.htpasswd;
      proxy_pass http://api:8000/health;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      limit_req zone=api_limit burst=20 nodelay;
    }

    location ^~ /api/ {
      auth_basic "kb api";
      auth_basic_user_file /srv/projects/kb/data/ssl/.htpasswd;
      proxy_pass http://api:8000/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      limit_req zone=api_limit burst=20 nodelay;
    }

    location / { try_files $uri $uri/ =404; }
  }
}
