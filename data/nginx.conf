user  nginx;
worker_processes auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
        codex/split-existing-service-into-containers
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log warn;

  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
        main

  sendfile        on;
  keepalive_timeout  65;

  access_log /var/log/nginx/access.log;
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

  upstream fastapi {
    server knowlab_api:8080;
  }

  server {
    listen 80;
    server_name kb.local;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name kb.local;

    ssl_certificate     /etc/nginx/ssl/kb.local.crt;
    ssl_certificate_key /etc/nginx/ssl/kb.local.key;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header Referrer-Policy "no-referrer";

    root /usr/share/nginx/html;

    location = /health {
      auth_basic "kb api";
        codex/split-existing-service-into-containers
      auth_basic_user_file /srv/projects/kb/data/ssl/.htpasswd;
      proxy_pass http://api:8000/health;

      auth_basic_user_file /etc/nginx/ssl/.htpasswd;
      proxy_pass http://fastapi/health;
        main
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      limit_req zone=api_limit burst=20 nodelay;
    }

    location ^~ /api/ {
      auth_basic "kb api";
        codex/split-existing-service-into-containers
      auth_basic_user_file /srv/projects/kb/data/ssl/.htpasswd;
      proxy_pass http://api:8000/api/;

      auth_basic_user_file /etc/nginx/ssl/.htpasswd;
      proxy_pass http://fastapi$request_uri;
        main
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      limit_req zone=api_limit burst=20 nodelay;
    }

    location = / {
      try_files /index.html =404;
    }

    location / {
      try_files $uri $uri/ =404;
    }
  }
}
