version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowlab_api
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      OLLAMA_BASE_URL: http://ollama:11434
      DATABASE_URL: ${DATABASE_URL:-}
    volumes:
      - /opt/knowlab/data/files:/opt/knowlab/data/files
      - /opt/knowlab/data/logs/api:/opt/knowlab/data/logs/api
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: knowlab_nginx
    depends_on:
      api:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/knowlab/data/ssl:/etc/nginx/ssl:ro
      - /opt/knowlab/data/www:/usr/share/nginx/html:ro
      - /opt/knowlab/data/logs/nginx:/var/log/nginx
    networks:
      - proxy
      - internal
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.1
    container_name: knowlab_qdrant
    volumes:
      - /opt/knowlab/data/qdrant:/qdrant/storage
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: knowlab_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kb}
      POSTGRES_USER: ${POSTGRES_USER:-kb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kb}
    volumes:
      - /opt/knowlab/data/pg:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.3.12
    container_name: knowlab_ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
    volumes:
      - /opt/knowlab/data/ollama:/root/.ollama
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

networks:
  internal:
  proxy:
