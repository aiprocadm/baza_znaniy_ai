services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
        codex/split-existing-service-into-containers
    env_file: .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      OLLAMA_BASE_URL: http://ollama:11434
      DATABASE_URL: ${DATABASE_URL:-}
    volumes:
      - ./data/files:/srv/projects/kb/data/files
      - ./data/logs/api:/srv/projects/kb/data/logs
    depends_on:

    container_name: knowlab_api
    env_file: .env
    volumes:
      - /opt/knowlab/data/files:/opt/knowlab/data/files
    depends_on:
      postgres:
        condition: service_healthy
        main
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
        codex/split-existing-service-into-containers
      db:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [backend]

  nginx:
    image: nginx:1.27-alpine
    container_name: knowlab_nginx
    depends_on:
      api:
        condition: service_healthy
        main
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/nginx.conf:/etc/nginx/nginx.conf:ro
        codex/split-existing-service-into-containers
      - ./data/ssl:/srv/projects/kb/data/ssl:ro
      - ./data/www:/srv/projects/kb/data/www:ro
      - ./data/logs/nginx:/var/log/nginx
    depends_on:
      api:
        condition: service_started
    networks:
      - proxy
      - internal
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.3.12
    environment:
      OLLAMA_HOST: 0.0.0.0
    volumes:
      - ./data/files/ollama:/root/.ollama
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.1
    volumes:
      - ./data/qdrant:/qdrant/storage
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kb}
      POSTGRES_USER: ${POSTGRES_USER:-kb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kb}
    volumes:
      - ./data/pg:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  internal:
  proxy:

      - /opt/knowlab/data/files/www:/usr/share/nginx/html:ro
      - /opt/knowlab/data/files/ssl:/etc/nginx/ssl:ro
      - /opt/knowlab/data/logs/nginx:/var/log/nginx
    networks: [edge, backend]
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:1.11.0
    container_name: knowlab_qdrant
    volumes:
      - /opt/knowlab/data/qdrant:/qdrant/storage
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: knowlab_postgres
    env_file: .env
    environment:
      - POSTGRES_DB=${PGDATABASE}
      - POSTGRES_USER=${PGUSER}
      - POSTGRES_PASSWORD=${PGPASSWORD}
    volumes:
      - /opt/knowlab/data/pg:/var/lib/postgresql/data
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d \"$${PGDATABASE}\" -U \"$${PGUSER}\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama:
    image: ollama/ollama:0.3.12
    container_name: knowlab_ollama
    volumes:
      - /opt/knowlab/data/files/ollama:/root/.ollama
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  edge:
    driver: bridge
  backend:
    driver: bridge
        main
