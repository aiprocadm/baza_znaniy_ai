services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      OLLAMA_BASE_URL: http://ollama:11434
      DATABASE_URL: ${DATABASE_URL:-}
    volumes:
      - ./data/files:/srv/projects/kb/data/files
      - ./data/logs/api:/srv/projects/kb/data/logs
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/ssl:/srv/projects/kb/data/ssl:ro
      - ./data/www:/srv/projects/kb/data/www:ro
      - ./data/logs/nginx:/var/log/nginx
    depends_on:
      api:
        condition: service_started
    networks:
      - proxy
      - internal
    restart: unless-stopped

  ollama:
    image: ollama/ollama:0.3.12
    environment:
      OLLAMA_HOST: 0.0.0.0
    volumes:
      - ./data/files/ollama:/root/.ollama
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.1
    volumes:
      - ./data/qdrant:/qdrant/storage
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kb}
      POSTGRES_USER: ${POSTGRES_USER:-kb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kb}
    volumes:
      - ./data/pg:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  internal:
  proxy:
