version: "3.9"

services:
  kb_web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kb_web
    env_file:
      - .env
    environment:
      FILES_ROOT: /srv/projects/kb/data/files
      GEN_MODEL: qwen2.5:3b-instruct
      EMBED_MODEL: intfloat/multilingual-e5-small
      RAG_CHUNK: "900"
      RAG_OVERLAP: "140"
      RETRIEVE_TOPK: "10"
      CHAT_MEMORY_ENABLED: "true"
      CHAT_MEMORY_TTL_DAYS: "90"
      CHAT_SUMMARY_TRIGGER: "10"
      CHAT_MEMORY_MAXTOK: "2000"
      QDRANT_URL: http://127.0.0.1:6333
      QDRANT_COLLECTION: kb_chunks
      QDRANT_API_KEY: ""
      OLLAMA_HOST: http://127.0.0.1:11434
    ports:
      - "80:80"
      - "443:443"
      - "11434:11434"
      - "6333:6333"
    volumes:
      - /srv/projects/kb/data/files:/srv/projects/kb/data/files
      - /srv/projects/kb/data/www:/srv/projects/kb/data/www
      - /srv/projects/kb/data/ssl:/etc/nginx/ssl:ro
      - /srv/projects/kb/data/storage/ollama:/srv/projects/kb/data/storage/ollama
      - /srv/projects/kb/data/storage/qdrant:/srv/projects/kb/data/storage/qdrant
      - /srv/projects/kb/data/logs/api:/srv/projects/kb/data/logs/api
      - /srv/projects/kb/data/logs/nginx:/srv/projects/kb/data/logs/nginx
      - /srv/projects/kb/data/logs/ollama:/srv/projects/kb/data/logs/ollama
      - /srv/projects/kb/data/logs/qdrant:/srv/projects/kb/data/logs/qdrant
      - /srv/projects/kb/data/logs/supervisor:/srv/projects/kb/data/logs/supervisor
    restart: unless-stopped
    networks:
      - web

networks:
  web:
    external: true
