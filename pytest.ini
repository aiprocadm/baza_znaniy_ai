[pytest]
addopts = -q --capture=sys
# Pin pytest-asyncio's fixture loop scope to the upcoming default ("function")
# so it stops emitting the "asyncio_default_fixture_loop_scope is unset"
# deprecation on every run. This matches current behaviour (async fixtures
# already default to function scope), so it is purely noise removal.
asyncio_default_fixture_loop_scope = function
# Default collection targets the active test tree only. testpaths is consulted
# ONLY when no path is passed on the CLI, so explicit `pytest <path>`
# invocations are unaffected.
testpaths = tests
filterwarnings =
    ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning
markers =
    requires_postgres: marks tests that need a local PostgreSQL server
    integration: marks tests that need real ML libraries (trl, transformers, torch) — only runs in CI
