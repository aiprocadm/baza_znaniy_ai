[pytest]
addopts = -q --capture=sys
# Default collection targets the active test tree only. Legacy backend/tests/
# target removed models and fail at collection (CI runs them, if ever, via
# explicit paths — see .github/workflows/ci.yml). testpaths is consulted ONLY
# when no path is passed on the CLI, so explicit `pytest backend/tests/...`
# and `pytest --ignore=backend` invocations are unaffected. This makes a bare
# `pytest` match the gating `python-ci` job (which uses --ignore=backend).
testpaths = tests
filterwarnings =
    ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning
markers =
    requires_postgres: marks tests that need a local PostgreSQL server
    integration: marks tests that need real ML libraries (trl, transformers, torch) — only runs in CI
