name: Python test matrix

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }} tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    env:
      DATA_DIR: ${{ runner.temp }}/storage
      DB_URL: sqlite+aiosqlite:///./var/data/test.sqlite
      PIP_DISABLE_PIP_VERSION_CHECK: '1'
      PYTHONDONTWRITEBYTECODE: '1'
      PYTHONUNBUFFERED: '1'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml
            poetry.lock

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Purge pip cache
        run: python -m pip cache purge

      - name: Install CPU PyTorch
        run: python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.4.1

      - name: Install project dependencies
        run: |
          set -euo pipefail
          python -m pip install -r requirements-runtime.txt -r requirements-llm.txt -r requirements-dev.txt
          python -m pip install -e .

      - name: Restore GGUF cache
        uses: actions/cache@v4
        with:
          path: models/model.gguf
          key: gguf-${{ hashFiles('models/model_manifest.json') }}
          restore-keys: |
            gguf-

      - name: Download GGUF model
        run: |
          mkdir -p models
          python -m scripts.download_model --manifest models/model_manifest.json --output models/model.gguf --allow-missing-hash --max-retries 5

      - name: Prepare runtime directories
        run: |
          mkdir -p "$DATA_DIR" var/data

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run pytest with coverage
        run: |
          coverage run -m pytest -vv --maxfail=1 --disable-warnings
          coverage xml
          coverage html -d cov_html

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-python-${{ matrix.python-version }}
          path: |
            coverage.xml
            cov_html
          if-no-files-found: warn
