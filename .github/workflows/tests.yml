name: Run Python tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          [ -f requirements.txt ] && pip install -r requirements.txt || true
          pip install pytest

      - name: Prepare test storage directory
        run: mkdir -p ${{ runner.temp }}/storage

      - name: Run all tests
        run: pytest -v
        env:
          DATA_DIR: ${{ runner.temp }}/storage
