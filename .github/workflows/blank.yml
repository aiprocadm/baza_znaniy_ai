name: Utility workflow

on:
  workflow_dispatch:
    inputs:
      message:
        description: Message to print in the log and workflow summary
        default: Hello from GitHub Actions!
        required: false
      show-environment:
        description: "Display runner environment information"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  info:
    name: Print diagnostic information
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print message
        run: |
          echo "${{ github.event.inputs.message }}"
          {
            echo "Triggered by: ${{ github.actor }}"
            echo "Repository:  $GITHUB_REPOSITORY"
            echo "Workflow run: $GITHUB_RUN_ID"
            echo "Message:      ${{ github.event.inputs.message }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Display environment details
        if: ${{ github.event.inputs.show-environment == 'true' }}
        run: |
          echo "Runner: $(uname -a)"
          echo "Default Python: $(python3 --version)"
          env | sort
