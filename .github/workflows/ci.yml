name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-ci:
    name: Lint & test (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml
            poetry.lock

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Purge pip cache
        run: python -m pip cache purge

      - name: Install CPU PyTorch
        run: python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.4.1

      - name: Install project dependencies
        run: |
          python -m pip install -r requirements-runtime.txt -r requirements-llm.txt -r requirements-dev.txt
          python -m pip install -e .

      - name: Restore GGUF cache
        uses: actions/cache@v4
        with:
          path: models/model.gguf
          key: gguf-${{ hashFiles('models/model_manifest.json') }}
          restore-keys: |
            gguf-

      - name: Download GGUF model
        run: |
          mkdir -p models
          python -m scripts.download_model --manifest models/model_manifest.json --output models/model.gguf --allow-missing-hash --max-retries 5

      - name: Run database migrations
        env:
          DB_URL: sqlite+aiosqlite:///./var/data/ci.sqlite
        run: |
          mkdir -p var/data
          alembic upgrade head

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

      - name: MyPy (types)
        continue-on-error: true
        run: mypy .

      - name: Run pytest with coverage
        run: |
          coverage run -m pytest -q --deselect backend/tests/test_contract_schemathesis.py
          coverage xml
          coverage html -d cov_html

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: cov_html
          if-no-files-found: warn

      - name: Run schemathesis contract tests
        run: pytest backend/tests/test_contract_schemathesis.py -q

  docker-lint-build:
    runs-on: ubuntu-latest
    if: hashFiles('Dockerfile') != ''
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint (Dockerfile lint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker build
        run: docker build -t test-image:ci .

  web-ci:
    name: Frontend lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json
      - name: Install dependencies
        run: npm install
      - name: Run lint
        run: npm run lint
      - name: Run tests
        run: npm run test
      - name: Build
        run: npm run build

  shell-lint:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('**/*.sh') != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0

  python-warnings-smoke:
    name: Smoke tests (warnings as errors)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install CPU PyTorch
        run: python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.4.1

      - name: Install project dependencies
        run: |
          python -m pip install -r requirements-runtime.txt -r requirements-llm.txt -r requirements-dev.txt
          python -m pip install -e .

      - name: Run smoke tests with warnings as errors
        run: |
          pytest -q \
            -W error::DeprecationWarning \
            -W error::ResourceWarning \
            tests/test_api_v1_upload.py \
            tests/test_routes_upload_file.py
