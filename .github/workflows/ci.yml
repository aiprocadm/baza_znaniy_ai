name: CI
on:
  push:
  pull_request:
jobs:
  detect-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Узнаём стек
      - id: detect
        run: |
          if [ -f package.json ]; then echo "stack=node" >> $GITHUB_OUTPUT; fi
          if [ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f app.py ] || [ -f main.py ]; then echo "stack=python" >> $GITHUB_OUTPUT; fi
          if [ -f docker-compose.yml ] || [ -f compose.yml ]; then echo "has_compose=true" >> $GITHUB_OUTPUT; fi

      # Node.js
      - if: steps.detect.outputs.stack == 'node'
        uses: actions/setup-node@v4
        with: { node-version: 'lts/*' }
      - if: steps.detect.outputs.stack == 'node'
        run: |
          npm ci || npm install
          npm run test --if-present
          npm run build --if-present
          npm run start --if-present || npm run dev --if-present || true

      # Python
      - if: steps.detect.outputs.stack == 'python'
        uses: actions/setup-python@v5
        with: { python-version: '3.x' }
      - if: steps.detect.outputs.stack == 'python'
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install . || true; fi
          python -m pytest -q || true
          [ -f app.py ] && python app.py & sleep 5 && kill %1 || true
          [ -f main.py ] && python main.py & sleep 5 && kill %1 || true

      # Docker Compose (если есть)
      - if: steps.detect.outputs.has_compose == 'true'
        uses: docker/setup-buildx-action@v3
      - if: steps.detect.outputs.has_compose == 'true'
        run: |
          docker compose version
          docker compose up --build -d
          sleep 10
          docker compose ps
          docker compose logs --no-color --tail=200 || true
          docker compose down
