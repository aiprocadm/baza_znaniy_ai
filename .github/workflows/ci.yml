name: CI
on:
  push:
  pull_request:

jobs:
  python-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install -U pip
          # проектные зависимости (если файла нет — не упадём)
          [ -f requirements.txt ] && pip install -r requirements.txt || true
          # dev-инструменты
          pip install pytest ruff black mypy coverage

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

      - name: MyPy (types)  # не валим сборку, если типизация не готова
        run: mypy . || true

      - name: PyTest
        run: |
          coverage run -m pytest -q || pytest -q

      - name: Coverage report
        if: success()
        run: |
          coverage html -d cov_html || true
          coverage xml || true

      - name: Upload coverage artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: cov_html
          if-no-files-found: ignore

  docker-lint-build:
    runs-on: ubuntu-latest
    if: hashFiles('Dockerfile') != ''
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint (Dockerfile lint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
      - name: Build image
        uses: docker/setup-buildx-action@v3
      - name: docker build
        run: docker build -t test-image:ci .

  shell-lint:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('**/*.sh') != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
