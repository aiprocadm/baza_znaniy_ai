name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  path-classifier:
    name: Classify changed paths
    runs-on: ubuntu-latest
    outputs:
      app_changed: ${{ steps.filter.outputs.app }}
      frontend_changed: ${{ steps.filter.outputs.frontend }}
      legacy_changed: ${{ steps.filter.outputs.legacy }}
      docs_changed: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'app/**'
              - 'alembic/**'
              - 'requirements-runtime.txt'
              - 'requirements-llm.txt'
              - 'requirements-dev.txt'
              - 'pyproject.toml'
              - 'tests/**'
            frontend:
              - 'frontend/**'
            legacy:
              - 'backend/**'
            docs:
              - 'README.md'
              - 'Dockerfile'
              - 'docker-compose.yml'
              - '.github/workflows/ci.yml'

  legacy-path-guard:
    name: Guard legacy path changes
    runs-on: ubuntu-latest
    needs: [path-classifier]
    steps:
      - name: Validate legacy changes are explicitly approved
        env:
          LEGACY_CHANGED: ${{ needs.path-classifier.outputs.legacy_changed }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "Guard applies to pull_request only"
            exit 0
          fi

          if [ "$LEGACY_CHANGED" != "true" ]; then
            echo "No changes in legacy path backend/**"
            exit 0
          fi

          echo "Detected changes in legacy path backend/**"
          echo "Labels: $PR_LABELS"

          if echo "$PR_LABELS" | grep -Eq '(^|,)legacy-path-approved(,|$)' ; then
            echo "Found required label: legacy-path-approved"
            exit 0
          fi

          if echo "$PR_TITLE $PR_BODY" | grep -qi '\[legacy-ok\]' ; then
            echo "Found explicit flag [legacy-ok] in PR title/body"
            exit 0
          fi

          echo "ERROR: backend/** is legacy/experimental. Add label 'legacy-path-approved' or flag [legacy-ok] in PR title/body."
          exit 1


  openapi-primary-guard:
    name: Guard OpenAPI primary publication
    runs-on: ubuntu-latest
    needs: [path-classifier, legacy-path-guard]
    steps:
      - uses: actions/checkout@v4
      - name: Verify a single primary OpenAPI source
        run: |
          set -euo pipefail
          PRIMARY_OPENAPI="app/api/main.py"
          LEGACY_OPENAPI="backend/app/main.py"

          if [ "$PRIMARY_OPENAPI" = "$LEGACY_OPENAPI" ]; then
            echo "ERROR: primary and legacy OpenAPI paths must differ"
            exit 1
          fi

          # Use grep (always available) instead of rg (not installed by default
          # on ubuntu-latest). -E for extended regex on the first check, -F for
          # fixed-string on the second so backticks in the pattern are taken
          # literally (otherwise the shell would treat them as command
          # substitution and try to execute app/api/main.py).
          if grep -nE "(primary|основн).*OpenAPI.*backend/app/main\.py" README.md; then
            echo "ERROR: README marks legacy OpenAPI as primary"
            exit 1
          fi

          # Match both bold and plain markdown styles. Pattern is wrapped in
          # single quotes so the shell does not expand backticks as command
          # substitution; the regex itself stays as a single argument to grep.
          if ! grep -nE '(\*\*)?Source-of-truth backend entrypoint:(\*\*)? +`app/api/main\.py`' README.md; then
            echo "ERROR: README must explicitly pin app/api/main.py as source-of-truth"
            exit 1
          fi

          echo "OpenAPI publication guard passed"

  python-ci:
    name: Lint & test (Python, active runtime path)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.path-classifier.outputs.app_changed == 'true'
    needs: [path-classifier, legacy-path-guard, openapi-primary-guard]
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml
            poetry.lock

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Purge pip cache
        run: python -m pip cache purge

      - name: Install CPU PyTorch
        run: python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.4.1

      - name: Install project dependencies
        run: |
          python -m pip install -r requirements-runtime.txt -r requirements-llm.txt -r requirements-dev.txt
          python -m pip install -e .

      - name: Restore GGUF cache
        uses: actions/cache@v4
        with:
          path: models/model.gguf
          key: gguf-${{ hashFiles('models/model_manifest.json') }}
          restore-keys: |
            gguf-

      - name: Download GGUF model
        # The TinyLlama mirror on Hugging Face now requires auth (HTTP 401
        # under anonymous CI traffic). Most pytest tests use in-tree stubs
        # and do not need ``models/model.gguf`` to exist; the integration
        # tests that *do* need it already skip when the file is missing.
        # Keep the download step (so a cached blob is picked up when
        # present) but do not gate the whole CI run on a 3rd-party mirror.
        continue-on-error: true
        run: |
          mkdir -p models
          python -m scripts.download_model --manifest models/model_manifest.json --output models/model.gguf --allow-missing-hash --max-retries 5

      - name: Run database migrations
        env:
          DB_URL: sqlite+aiosqlite:///./var/data/ci.sqlite
        run: |
          mkdir -p var/data
          alembic upgrade head

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

      - name: MyPy (types)
        continue-on-error: true
        run: mypy .

      - name: Run pytest with coverage
        run: |
          coverage run -m pytest -q --deselect backend/tests/test_contract_schemathesis.py
          coverage xml
          coverage html -d cov_html

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: cov_html
          if-no-files-found: warn


  docker-lint-build:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.path-classifier.outputs.app_changed == 'true' || needs.path-classifier.outputs.legacy_changed == 'true'
    needs: [path-classifier, legacy-path-guard, openapi-primary-guard]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint (Dockerfile lint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker build
        run: docker build -t test-image:ci .

  web-ci:
    name: Frontend lint & test (primary UI path)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.path-classifier.outputs.frontend_changed == 'true'
    needs: [path-classifier, legacy-path-guard, openapi-primary-guard]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json
      - name: Install dependencies
        run: npm install
      - name: Run lint
        run: npm run lint
      - name: Run tests
        run: npm run test
      - name: Build
        run: npm run build

  shell-lint:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || needs.path-classifier.outputs.app_changed == 'true' || needs.path-classifier.outputs.frontend_changed == 'true' || needs.path-classifier.outputs.legacy_changed == 'true' }}
    needs: [path-classifier, legacy-path-guard, openapi-primary-guard]
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0

  python-warnings-smoke:
    name: Smoke tests (warnings as errors, optional)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.path-classifier.outputs.app_changed == 'true'
    needs: [path-classifier, legacy-path-guard, openapi-primary-guard]
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install CPU PyTorch
        run: python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.4.1

      - name: Install project dependencies
        run: |
          python -m pip install -r requirements-runtime.txt -r requirements-llm.txt -r requirements-dev.txt
          python -m pip install -e .

      - name: Run smoke tests with warnings as errors
        run: |
          pytest -q \
            -W error::DeprecationWarning \
            -W error::ResourceWarning \
            tests/test_api_v1_upload.py \
            tests/test_routes_upload_file.py


  legacy-compatibility-tests:
    name: Compatibility tests (legacy backend/app/* path)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || needs.path-classifier.outputs.legacy_changed == 'true'
    needs: [path-classifier, legacy-path-guard, openapi-primary-guard]
    timeout-minutes: 20
    env:
      KB_LEGACY_COMPAT_MODE: "1"
      LEGACY_BACKEND_ENTRYPOINT: backend.app.main:app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.4.1
      - run: |
          python -m pip install -r requirements-runtime.txt -r requirements-llm.txt -r requirements-dev.txt
          python -m pip install -e .
      - name: Run legacy compatibility contract suite
        run: pytest backend/tests/test_contract_schemathesis.py backend/tests/test_health.py -q
