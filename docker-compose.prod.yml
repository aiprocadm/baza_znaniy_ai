services:
  qdrant:
    image: qdrant/qdrant:${QDRANT_IMAGE_TAG:-v1.15.4}
    restart: unless-stopped
    environment:
      QDRANT__STORAGE__ON_DISK: "true"
    volumes:
      - ./var/data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import json,sys,urllib.request;sys.exit(0 if json.load(urllib.request.urlopen('http://127.0.0.1:6333/healthz'))['status']=='ok' else 1)\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  kb_api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "0"
    env_file:
      - .env
    environment:
      BACKEND_ENTRYPOINT: "app.api.main:app"
      INGEST_AUTOSTART_WORKER: "false"
      INGEST_USE_LOCAL_QUEUE: "false"
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/ready').getcode() == 200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  kb_worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "0"
    command: ["python", "-m", "app.worker.main"]
    env_file:
      - .env
    environment:
      INGEST_AUTOSTART_WORKER: "true"
      INGEST_USE_LOCAL_QUEUE: "false"
      QDRANT_URL: "http://qdrant:6333"
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import importlib.util,sys;sys.exit(0 if importlib.util.find_spec('app.worker.main') else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.3.1
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.path=/prometheus"]
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./var/data/prometheus:/prometheus
    depends_on:
      kb_api:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:9090/-/healthy"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.0.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./var/data/grafana:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
