[project]
name = "kb-ai"
version = "0.1.0"
dynamic = ["dependencies"]

[project.optional-dependencies]
runtime = { file = ["requirements-runtime.txt"] }
llm = { file = ["requirements-llm.txt"] }
train = { file = ["requirements-train.txt"] }
dev = { file = ["requirements-dev.txt"] }
all = { include = ["runtime", "llm", "dev"] }

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.dynamic]
dependencies = { file = ["requirements-runtime.txt"] }

[tool.black]
line-length = 100

[tool.ruff]
line-length = 100

[tool.ruff.lint]
ignore = ["E402"]
